workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: latest
    triggering:
      events:
        - push
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
